<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Agent Workflow — Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f5f5;
    --paper-2: #ececec;
    --ink: #2d3142;
    --muted: #4f5d75;
    --soft: #7a8399;
    --rule: rgba(45,49,66,0.12);
    --accent: #eb6c36;
    --accent-tint: rgba(235,108,54,0.08);
    --link: #2e5aa8;
  }
  body { margin: 0; background: var(--paper); font-family: 'Geist', system-ui, sans-serif; }
  .diagram { width: 100%; max-width: 1100px; margin: 40px auto; }
  .title { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-weight: 400; fill: var(--ink); }
  .subtitle { font-family: 'Geist Mono', monospace; font-size: 9px; fill: var(--muted); letter-spacing: 0.06em; }
  .node-label { font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 600; fill: var(--ink); }
  .node-sub { font-family: 'Geist Mono', monospace; font-size: 9px; fill: var(--muted); }
  .arrow-label { font-family: 'Geist Mono', monospace; font-size: 8px; fill: var(--muted); letter-spacing: 0.04em; }
  .boundary-label { font-family: 'Geist Mono', monospace; font-size: 8px; fill: var(--soft); letter-spacing: 0.06em; }
  .tag { font-family: 'Geist Mono', monospace; font-size: 7px; fill: var(--muted); letter-spacing: 0.08em; }
  .loop-text { font-family: 'Instrument Serif', serif; font-size: 13px; font-style: italic; fill: var(--soft); }
</style>
</head>
<body>
<div class="diagram">
<svg viewBox="0 0 1100 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f5d75"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#eb6c36"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7a8399"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="title">Nexus Agent Workflow</text>
  <text x="40" y="56" class="subtitle">SHARED MEMORY LAYER FOR ALL SCALE AGENTS</text>

  <!-- ─── AGENTS ROW ─── -->
  <!-- Scout -->
  <rect x="40" y="88" width="120" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="100" y="110" class="node-label" text-anchor="middle">Scout</text>
  <text x="100" y="124" class="node-sub" text-anchor="middle">Agent VM</text>
  <rect x="56" y="136" width="36" height="12" rx="2" fill="rgba(46,90,168,0.08)" stroke="rgba(46,90,168,0.5)" stroke-width="0.8"/>
  <text x="74" y="145" class="tag" text-anchor="middle" fill="#2e5aa8">AGENT</text>
  <text x="100" y="162" class="node-sub" text-anchor="middle">business intel</text>

  <!-- Fulcrum -->
  <rect x="200" y="88" width="120" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="260" y="110" class="node-label" text-anchor="middle">Fulcrum</text>
  <text x="260" y="124" class="node-sub" text-anchor="middle">Backend VM</text>
  <rect x="216" y="136" width="48" height="12" rx="2" fill="rgba(46,90,168,0.08)" stroke="rgba(46,90,168,0.5)" stroke-width="0.8"/>
  <text x="240" y="145" class="tag" text-anchor="middle" fill="#2e5aa8">PRODUCER</text>
  <text x="260" y="162" class="node-sub" text-anchor="middle">SOWs, quotes</text>

  <!-- My Scale -->
  <rect x="360" y="88" width="120" height="80" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="420" y="110" class="node-label" text-anchor="middle">My Scale</text>
  <text x="420" y="124" class="node-sub" text-anchor="middle">Backend VM</text>
  <rect x="376" y="136" width="48" height="12" rx="2" fill="rgba(46,90,168,0.08)" stroke="rgba(46,90,168,0.5)" stroke-width="0.8"/>
  <text x="400" y="145" class="tag" text-anchor="middle" fill="#2e5aa8">PRODUCER</text>
  <text x="420" y="162" class="node-sub" text-anchor="middle">QBR reports</text>

  <!-- ─── NEXUS BOUNDARY ─── -->
  <rect x="520" y="72" width="200" height="360" rx="8" fill="none" stroke="rgba(235,108,54,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="540" y="64" width="48" height="14" rx="2" fill="#f5f5f5"/>
  <text x="564" y="74" class="tag" text-anchor="middle" fill="#eb6c36" font-weight="600" letter-spacing="0.1em">NEXUS</text>

  <!-- MCP Server -->
  <rect x="540" y="92" width="160" height="80" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1.5"/>
  <text x="620" y="114" class="node-label" text-anchor="middle">Nexus MCP</text>
  <text x="620" y="128" class="node-sub" text-anchor="middle">SSE · Node 22 + Python</text>
  <rect x="548" y="144" width="36" height="12" rx="2" fill="rgba(235,108,54,0.15)"/>
  <text x="566" y="153" class="tag" text-anchor="middle" fill="#eb6c36">CORE</text>
  <text x="620" y="168" class="node-sub" text-anchor="middle">search · get · list · ingest</text>

  <!-- Write API -->
  <rect x="540" y="192" width="160" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="620" y="212" class="node-label" text-anchor="middle">Write API</text>
  <text x="620" y="226" class="node-sub" text-anchor="middle">POST /api/documents</text>
  <text x="620" y="240" class="node-sub" text-anchor="middle">POST /api/ingest</text>

  <!-- Query API -->
  <rect x="540" y="276" width="160" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <text x="620" y="296" class="node-label" text-anchor="middle">Query API</text>
  <text x="620" y="310" class="node-sub" text-anchor="middle">SearchDocuments</text>
  <text x="620" y="324" class="node-sub" text-anchor="middle">GetDocument · ListDocuments</text>

  <!-- MarkItDown -->
  <rect x="540" y="360" width="160" height="52" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <text x="620" y="378" class="node-label" text-anchor="middle">MarkItDown</text>
  <text x="620" y="392" class="node-sub" text-anchor="middle">Python · PDF → markdown</text>
  <rect x="548" y="400" width="52" height="10" rx="2" fill="transparent" stroke="rgba(45,49,66,0.25)" stroke-width="0.8"/>
  <text x="574" y="408" class="tag" text-anchor="middle" fill="var(--muted)">SCOUT ONLY</text>

  <!-- ─── DATA STORES ─── -->
  <!-- MongoDB Atlas -->
  <rect x="760" y="92" width="160" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <text x="840" y="114" class="node-label" text-anchor="middle">MongoDB Atlas</text>
  <text x="840" y="128" class="node-sub" text-anchor="middle">metadata catalog</text>
  <rect x="768" y="140" width="32" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.3)" stroke-width="0.8"/>
  <text x="784" y="149" class="tag" text-anchor="middle" fill="var(--muted)">DB</text>
  <text x="840" y="162" class="node-sub" text-anchor="middle">documents · topics · areas</text>

  <!-- MinIO S3 -->
  <rect x="760" y="184" width="160" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <text x="840" y="206" class="node-label" text-anchor="middle">MinIO S3</text>
  <text x="840" y="220" class="node-sub" text-anchor="middle">file storage</text>
  <rect x="768" y="232" width="28" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.3)" stroke-width="0.8"/>
  <text x="782" y="241" class="tag" text-anchor="middle" fill="var(--muted)">S3</text>
  <text x="840" y="254" class="node-sub" text-anchor="middle">nova-vault bucket</text>

  <!-- ─── ARROWS ─── -->
  <!-- Scout → MCP (write + query) -->
  <line x1="160" y1="124" x2="538" y2="124" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="300" y="118" class="arrow-label" fill="#2e5aa8">ingest · query</text>

  <!-- Fulcrum → MCP -->
  <line x1="320" y1="124" x2="538" y2="124" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="395" y="114" class="arrow-label" fill="#2e5aa8">write metadata</text>

  <!-- My Scale → MCP -->
  <line x1="480" y1="124" x2="538" y2="124" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="505" y="114" class="arrow-label" fill="#2e5aa8">write metadata</text>

  <!-- MCP → MongoDB -->
  <line x1="700" y1="124" x2="758" y2="124" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="714" y="118" class="arrow-label">catalog</text>

  <!-- MCP → MinIO -->
  <line x1="700" y1="220" x2="758" y2="212" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="714" y="214" class="arrow-label">store files</text>

  <!-- MCP → MarkItDown -->
  <line x1="620" y1="172" x2="620" y2="190" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="626" y="182" class="arrow-label">convert</text>

  <!-- MarkItDown → MinIO (markdown sidecar) -->
  <line x1="700" y1="386" x2="758" y2="228" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="718" y="308" class="arrow-label">markdown sidecar</text>

  <!-- Return path (query results) -->
  <line x1="520" y1="150" x2="180" y2="190" stroke="#7a8399" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dash)"/>
  <text x="310" y="200" class="arrow-label">presigned URL · context</text>

  <line x1="520" y1="180" x2="360" y2="228" stroke="#7a8399" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dash)"/>

  <!-- ─── S3 PATH STRUCTURE ─── -->
  <text x="40" y="300" class="tag" fill="var(--soft)" letter-spacing="0.06em">S3 PATHS</text>
  <line x1="40" y1="306" x2="100" y2="306" stroke="rgba(45,49,66,0.20)" stroke-width="1"/>

  <text x="40" y="320" class="node-sub">/{clientId}/{year}/raw/{docId}.pdf</text>
  <text x="280" y="320" class="arrow-label">all raw files</text>

  <text x="40" y="336" class="node-sub">/{clientId}/{year}/text/{docId}.md</text>
  <text x="280" y="336" class="arrow-label">Scout markdown sidecar</text>

  <text x="40" y="352" class="node-sub">/{clientId}/{year}/files/{docId}/{name}</text>
  <text x="280" y="352" class="arrow-label">agent uploads</text>

  <!-- ─── AGENT LOOP BOX ─── -->
  <rect x="40" y="380" width="440" height="64" rx="6" fill="rgba(46,90,168,0.06)" stroke="#2e5aa8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="56" y="398" class="node-label" fill="#2e5aa8">Agent Loop (RAG)</text>
  <text x="56" y="416" class="node-sub">1. Query Nexus → 2. Found? → retrieve markdown (cheap) or PDF → provide answer</text>
  <text x="56" y="432" class="node-sub">3. Not found? → run expensive task → store result in Nexus → done</text>

  <!-- Annotation -->
  <text x="80" y="266" class="loop-text">"before you act,</text>
  <text x="80" y="282" class="loop-text">ask Nexus first"</text>

</svg>
</div>
</body>
</html>
